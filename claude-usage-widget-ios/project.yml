name: ClaudeUsage
options:
  bundleIdPrefix: com.sidbh.claudeusage
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  groupSortPosition: top
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""

targets:
  ClaudeUsage:
    type: application
    platform: iOS
    sources:
      - path: ClaudeUsage/App
        excludes: ["Info.plist", "*.entitlements"]
      - path: ClaudeUsage/Shared
      - path: ClaudeUsage/Resources/Assets.xcassets
    dependencies:
      - target: ClaudeUsageWidget
        embed: true
    info:
      path: ClaudeUsage/App/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        KeychainAccessGroup: "$(AppIdentifierPrefix)com.sidbh.claudeusage.shared"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: ClaudeUsage/App/ClaudeUsage.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sidbh.claudeusage
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.sidbh.claudeusage.shared"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidbh.claudeusage
        PRODUCT_NAME: "Claude Usage"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ClaudeUsageWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ClaudeUsage/Widget
        excludes: ["Info.plist", "*.entitlements"]
      - path: ClaudeUsage/Shared
      - path: ClaudeUsage/Resources/WidgetAssets.xcassets
    info:
      path: ClaudeUsage/Widget/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        KeychainAccessGroup: "$(AppIdentifierPrefix)com.sidbh.claudeusage.shared"
    entitlements:
      path: ClaudeUsage/Widget/ClaudeUsageWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sidbh.claudeusage
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.sidbh.claudeusage.shared"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidbh.claudeusage.widget
        PRODUCT_NAME: ClaudeUsageWidget
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
